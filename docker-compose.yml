version: "3.8"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/home/erc/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  query-api:
    build:
      context: .
      dockerfile: Dockerfile.query-api
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ./data:/home/erc/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped